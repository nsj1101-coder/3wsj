<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3w_sj</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
body { overflow: hidden; font-family: Tahoma, "Trebuchet MS", sans-serif; width: 100vw; height: 100vh; background: #000; }

/* ================================================
   LOGIN SCREEN — Windows XP (pixel-accurate)
   ================================================ */
#loginScreen {
  position: fixed; inset: 0; z-index: 99999;
  display: flex; flex-direction: column;
  background: radial-gradient(ellipse 120% 100% at 38% 48%,
    #7090e0 0%, #5878d0 30%, #3a5cc0 65%, #2848b0 100%);
  font-family: "Trebuchet MS", Tahoma, sans-serif;
  transition: opacity 0.7s ease;
}

/* Top thin strip */
.xp-top-strip {
  height: 22px; flex-shrink: 0;
  background: linear-gradient(to bottom, #1424a0 0%, #1830b0 100%);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* Main content row */
.xp-main {
  flex: 1; display: flex; overflow: hidden;
}

/* Left panel */
.xp-left {
  flex: 0 0 42%;
  display: flex; align-items: center; justify-content: center;
}
.xp-logo-block { display: flex; flex-direction: column; align-items: flex-start; gap: 0; }

/* XP flag logo SVG container */
.xp-flag { width: 72px; height: 64px; margin-bottom: 2px; }

.xp-ms-word {
  color: rgba(255,255,255,0.85); font-size: 11px; font-weight: 400;
  letter-spacing: 0.5px; margin-bottom: 1px;
  font-family: "Trebuchet MS", Tahoma, sans-serif;
}
.xp-windows-text {
  color: #fff; font-size: 34px; font-style: italic; font-weight: 400;
  letter-spacing: 0.5px; line-height: 1;
  text-shadow: 1px 1px 3px rgba(0,0,50,0.4);
  display: flex; align-items: baseline; gap: 4px;
  font-family: "Trebuchet MS", Tahoma, sans-serif;
}
.xp-xp-text {
  color: #ff9f00; font-size: 18px; font-style: italic; font-weight: bold;
}
.xp-tagline-sep {
  width: 100%; height: 1px; background: rgba(255,255,255,0.3);
  margin: 10px 0 10px;
}
.xp-tagline {
  color: rgba(255,255,255,0.92); font-size: 15px; font-style: italic;
  font-weight: 300; text-shadow: 1px 1px 2px rgba(0,0,40,0.4);
  font-family: "Trebuchet MS", Tahoma, sans-serif;
}

/* Vertical divider */
.xp-vdiv {
  width: 1px; flex-shrink: 0; margin: 28px 0;
  background: linear-gradient(to bottom,
    transparent 0%, rgba(255,255,255,0.45) 12%,
    rgba(255,255,255,0.55) 50%, rgba(255,255,255,0.45) 88%, transparent 100%);
}

/* Right panel */
.xp-right {
  flex: 1; display: flex; align-items: center;
  padding-left: 64px;
}
.xp-user-list { display: flex; flex-direction: column; gap: 4px; }

/* User tile */
.xp-user-tile {
  display: flex; align-items: flex-start; gap: 16px;
  padding: 8px 12px 8px 8px; cursor: default;
  border-radius: 4px; min-width: 320px;
}
.xp-user-tile:hover { background: rgba(255,255,255,0.06); }
.xp-avatar {
  width: 48px; height: 48px; flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.5); overflow: hidden;
}
.xp-user-info { flex: 1; padding-top: 2px; }
.xp-uname {
  color: #fff; font-size: 16px; font-weight: normal;
  text-shadow: 1px 1px 2px rgba(0,0,40,0.5); margin-bottom: 4px;
  font-family: "Trebuchet MS", Tahoma, sans-serif;
}
.xp-pw-hint {
  color: rgba(255,255,255,0.75); font-size: 11px; font-style: italic;
  margin-bottom: 6px; font-family: "Trebuchet MS", Tahoma, sans-serif;
}
.xp-pw-row { display: flex; align-items: center; gap: 4px; }
#pwInput {
  width: 160px; height: 26px;
  border: 2px inset; border-color: #8090c0 #c8d4f0 #c8d4f0 #8090c0;
  padding: 0 6px; font-size: 13px; font-family: Tahoma;
  background: #fff; color: #000; outline: none;
}
#pwInput:focus { border-color: #4a6ad8 #b0c0e8 #b0c0e8 #4a6ad8; }
#pwInput:disabled { background: #ddd; color: #888; cursor: not-allowed; }
.xp-go-btn {
  width: 28px; height: 26px;
  background: linear-gradient(to bottom, #60b840, #3a9020);
  border: 1px solid #2a7010;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: #fff; font-size: 14px; font-weight: bold;
}
.xp-go-btn:hover { background: linear-gradient(to bottom, #70c850, #4aa030); }
.xp-go-btn:active { filter: brightness(0.85); }
.xp-help-btn {
  width: 24px; height: 24px; border-radius: 50%;
  background: linear-gradient(to bottom, #6090d8, #3060b0);
  border: 1px solid #2050a0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: #fff; font-size: 12px; font-weight: bold;
}
.xp-err {
  color: #ffee55; font-size: 11px; min-height: 15px; margin-top: 5px;
  font-family: Tahoma, sans-serif;
  text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
}

/* Lock overlay */
#lockOverlay {
  display: none; position: absolute; inset: 0;
  background: rgba(10,15,60,0.92);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 10px; border-radius: 4px; z-index: 10;
}

/* Bottom strip */
.xp-bottom-strip {
  height: 52px; flex-shrink: 0;
  background: linear-gradient(to bottom, #1424a0 0%, #101890 100%);
  border-top: 2px solid #f0a000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px;
}
.xp-power-wrap {
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
}
.xp-power-icon {
  width: 32px; height: 32px; border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #f08020, #c04010);
  border: 2px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: #fff;
}
.xp-power-label {
  color: #fff; font-size: 13px; font-weight: bold;
  font-family: "Trebuchet MS", Tahoma, sans-serif;
}
.xp-bottom-info {
  color: rgba(255,255,255,0.75); font-size: 10.5px;
  text-align: right; line-height: 1.5;
  font-family: Tahoma, sans-serif;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  15%,45%,75% { transform: translateX(-10px); }
  30%,60%,90% { transform: translateX(10px); }
}

/* ================================================
   DESKTOP
   ================================================ */
#desktop {
  width: 100%; height: calc(100vh - 30px);
  background: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=2832&auto=format&fit=crop') center bottom / cover;
  padding: 14px; display: flex; flex-direction: column; gap: 10px; align-items: flex-start;
}
.desk-icon {
  width: 80px; display: flex; flex-direction: column; align-items: center;
  padding: 6px 4px 4px; cursor: pointer;
  border: 1px solid transparent; border-radius: 2px;
}
.desk-icon:hover { background: rgba(255,255,255,0.12); }
.desk-icon.sel { background: rgba(49,106,197,0.45); border-color: rgba(255,255,255,0.65); }
.desk-icon svg { width: 48px; height: 44px; display: block; margin-bottom: 5px; }
.desk-icon .dlbl {
  color: #fff; font-size: 11px; text-align: center; line-height: 1.3;
  text-shadow: 1px 1px 1px #000, -1px -1px 1px #000, 1px -1px 1px #000, -1px 1px 1px #000;
  padding: 1px 3px; max-width: 76px;
}
.desk-icon.sel .dlbl { background: #0258e8; text-shadow: none; }

/* ================================================
   TASKBAR
   ================================================ */
#taskbar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 30px;
  background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #333 100%);
  display: flex; align-items: center; justify-content: space-between; z-index: 9999;
}
#start-btn {
  height: 100%; border: none;
  background: linear-gradient(to bottom, #5cb65c, #3c8d3c);
  border-radius: 0 14px 14px 0; padding: 0 14px 0 8px;
  display: flex; align-items: center; gap: 6px;
  cursor: pointer; color: #fff; font-weight: bold; font-style: italic;
  font-size: 14px; font-family: Tahoma, sans-serif;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  box-shadow: inset 1px 1px rgba(255,255,255,0.3);
}
#start-btn:active { filter: brightness(0.85); }
.winlogo { width: 16px; height: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; transform: skewY(-10deg); }
.winlogo s { display: block; }
.winlogo s:nth-child(1) { background: #f04e23; }
.winlogo s:nth-child(2) { background: #79c539; }
.winlogo s:nth-child(3) { background: #00a4ef; }
.winlogo s:nth-child(4) { background: #fdbb00; }
#clock {
  height: 100%; background: linear-gradient(to bottom, #108ae5, #0e72bd);
  border-left: 1px solid rgba(255,255,255,0.15);
  padding: 0 14px; display: flex; align-items: center; color: #fff; font-size: 11px;
}

/* ================================================
   EXPLORER WINDOW
   ================================================ */
.xpwin {
  position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
  width: 900px; max-width: calc(100vw - 16px);
  height: 570px; max-height: calc(100vh - 60px);
  display: none; flex-direction: column;
  background: #ece9d8; border: 1px solid #00138c;
  border-radius: 8px 8px 0 0;
  box-shadow: 4px 4px 24px rgba(0,0,0,0.75), inset 0 0 0 1px #2050e0;
  z-index: 1000; overflow: hidden;
}
.xpwin.open { display: flex; }
.xptb {
  background: linear-gradient(to bottom, #0058e6 0%, #3a93ff 8%, #288eff 40%, #127dff 88%, #036bfe 100%);
  padding: 4px 6px 4px 8px; border-radius: 7px 7px 0 0;
  display: flex; align-items: center; justify-content: space-between;
  cursor: move; flex-shrink: 0; height: 28px;
}
.xptb-l {
  color: #fff; font-size: 12px; font-weight: bold;
  text-shadow: 1px 1px 0 rgba(0,0,80,0.5);
  display: flex; align-items: center; gap: 6px;
}
.xptb-r { display: flex; gap: 2px; }
.wxbtn {
  width: 21px; height: 21px; border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.5);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 10px; color: #222; font-family: Arial;
  background: linear-gradient(to bottom, #fff 0%, #e8e6d9 100%); line-height: 1;
}
.wxbtn:hover { filter: brightness(1.05); }
.wxbtn-x {
  background: linear-gradient(to bottom, #e98b7e 0%, #d84534 50%, #c42713 51%, #e03b26 100%);
  color: #fff !important; border-color: rgba(255,255,255,0.3);
}
.xpmb {
  background: #ece9d8; padding: 1px; border-bottom: 1px solid #fff;
  display: flex; flex-shrink: 0;
}
.xpmb span { padding: 3px 8px; font-size: 11px; cursor: default; }
.xpmb span:hover { background: #316ac5; color: #fff; }
.xpab {
  background: #ece9d8; padding: 3px 8px; border-bottom: 1px solid #aca899;
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.xpab label { font-size: 11px; color: #444; white-space: nowrap; }
.xpab-input {
  flex: 1; height: 22px; background: #fff;
  border: 1px solid #999; border-right-color: #e8e6d9; border-bottom-color: #e8e6d9;
  padding: 0 8px; font-size: 11px; font-family: Tahoma; color: #000;
  display: flex; align-items: center;
}
.xpbody { display: flex; flex: 1; overflow: hidden; }
.xpsb {
  width: 172px; flex-shrink: 0; background: #d3e5fa;
  border-right: 1px solid #99c8fc; padding: 6px 4px; font-size: 11px; overflow-y: auto;
}
.xpsb-sec { margin-bottom: 10px; }
.xpsb-sec h4 {
  background: linear-gradient(to right, #1e4aaa, #3060d0);
  color: #fff; font-size: 10px; font-weight: bold;
  padding: 3px 6px; margin-bottom: 3px;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.xpsb-link {
  padding: 3px 6px; display: flex; align-items: center; gap: 5px;
  color: #003399; cursor: pointer; font-size: 11px;
}
.xpsb-link:hover { background: rgba(255,255,255,0.6); }
.xpsb-link svg { width: 16px; height: 14px; flex-shrink: 0; }
#detailPane { padding: 6px; font-size: 10px; color: #444; line-height: 1.6; word-break: break-word; }
.xpfc {
  flex: 1; background: #fff;
  border-top: 1px solid #aca899; border-left: 1px solid #aca899;
  border-bottom: 1px solid #f0eeeb; border-right: 1px solid #f0eeeb;
  margin: 2px; overflow-y: auto; padding: 10px;
}
.xpfc::-webkit-scrollbar { width: 16px; background: #e3e3e3; }
.xpfc::-webkit-scrollbar-thumb { background: #c2c2c2; border: 1px solid; border-color: #f0eeeb #888 #888 #f0eeeb; }
.xpfc::-webkit-scrollbar-button { display: block; height: 16px; background: #e3e3e3; border: 1px outset #e8e8e8; }
.fgrid { display: grid; grid-template-columns: repeat(auto-fill, 112px); gap: 4px; }
.fitem {
  width: 112px; padding: 8px 4px 6px;
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer; border: 1px solid transparent; border-radius: 2px;
}
.fitem:hover { background: rgba(49,106,197,0.08); border-color: rgba(49,106,197,0.35); }
.fitem.sel { background: rgba(49,106,197,0.22); border-color: rgba(49,106,197,0.8); }
.fitem svg { width: 40px; height: 40px; display: block; margin-bottom: 5px; }
.fitem .fn { font-size: 11px; color: #000; text-align: center; line-height: 1.3; font-family: Tahoma; max-width: 104px; }
.xpst {
  background: #ece9d8; border-top: 1px solid #aca899;
  padding: 3px 8px; font-size: 11px; color: #444;
  flex-shrink: 0; display: flex; align-items: center; gap: 20px;
}
.xpst span { border-right: 1px inset #aca899; padding-right: 20px; }
.xpst span:last-child { border-right: none; padding-right: 0; }
</style>
</head>
<body>

<!-- ================================================ LOGIN SCREEN ================================================ -->
<div id="loginScreen">

  <!-- Top thin strip -->
  <div class="xp-top-strip"></div>

  <!-- Main content -->
  <div class="xp-main">

    <!-- LEFT: Windows XP logo + tagline -->
    <div class="xp-left">
      <div class="xp-logo-block">

        <svg class="xp-flag" viewBox="0 0 72 64" xmlns="http://www.w3.org/2000/svg">

          <path d="M34 30 C28 28 16 22 6 8 C12 18 22 26 34 30Z" fill="#f25022"/>

            <div style="font-size:36px;">🔒</div>

<!-- ================================================ DESKTOP ================================================ -->
<div id="desktop"></div>

<div id="taskbar">

<!-- Explorer Window -->

    <div class="xpab-input" id="addrBar">C:\3wsj\보고서</div>

    <div class="xpsb">
      <div class="xpsb-sec">
        <h4>파일 및 폴더 작업</h4>
        <div class="xpsb-link">
          <svg viewBox="0 0 16 14"><rect x="0" y="3" width="16" height="9" rx="1" fill="#FFBB00"/><path d="M0 3 H6 L8 1 H12 Q14 1 15 3 H0Z" fill="#F5C343"/></svg>
          새 폴더 만들기
        </div>
      </div>
      <div class="xpsb-sec">
        <h4>다른 위치</h4>
        <div class="xpsb-link" onclick="openFolder('reports')">
          <svg viewBox="0 0 16 14"><rect x="0" y="3" width="16" height="9" rx="1" fill="#FFBB00"/><path d="M0 3 H6 L8 1 H12 Q14 1 15 3 H0Z" fill="#F5C343"/></svg>보고서
        </div>
        <div class="xpsb-link" onclick="openFolder('external')">
          <svg viewBox="0 0 16 14"><rect x="0" y="3" width="16" height="9" rx="1" fill="#FFBB00"/><path d="M0 3 H6 L8 1 H12 Q14 1 15 3 H0Z" fill="#F5C343"/></svg>외부용

let locked = false;

// Session check — skip login if already authed this session

  document.getElementById('loginScreen').style.display = 'none';
}

function tryLogin() {
  if (locked) return;
  const val = document.getElementById('pwInput').value;

  if (val === PASS) {
    sessionStorage.setItem('3wsj_auth', '1');
    const ls = document.getElementById('loginScreen');
    ls.style.opacity = '0';
    setTimeout(() => ls.style.display = 'none', 700);
  } else {
    attempts++;
    document.getElementById('pwInput').value = '';

    if (attempts >= 3) {
      locked = true;
      document.getElementById('pwInput').disabled = true;
      document.getElementById('pwErr').textContent = '';
      document.getElementById('lockOverlay').style.display = 'flex';
      spamAlerts();
    } else {
      const remaining = 3 - attempts;
      document.getElementById('pwErr').textContent =
        `암호가 잘못되었습니다. ${remaining}번의 기회가 남았습니다.`;
      const tile = document.getElementById('userTile');
      tile.style.animation = 'shake 0.45s';
      tile.addEventListener('animationend', () => tile.style.animation = '', { once: true });
    }
  }
}

const addrBar = document.getElementById('addrBar');

const stCount = document.getElementById('stCount');
const stSel = document.getElementById('stSel');
const detailPane = document.getElementById('detailPane');

document.getElementById('closeBtn').onclick = () => win.classList.remove('open');

function openFolder(id) {
  const f = FOLDERS[id];
  winTitle.textContent = `3wsj — ${f.label}`;
  addrBar.textContent = f.path;
  stCount.textContent = `${f.files.length}개 항목`;
  stSel.textContent = '';
  detailPane.innerHTML = `<strong>${f.label}</strong><br>${f.files.length}개 항목`;

  fileGrid.innerHTML = '';
  f.files.forEach(file => {
    const el = document.createElement('div');
    el.className = 'fitem';
    el.innerHTML = (ICON[file.type] || ICON.doc) + `<span class="fn">${file.name}</span>`;
    el.addEventListener('click', e => {
      e.stopPropagation();
      document.querySelectorAll('.fitem').forEach(i => i.classList.remove('sel'));
      el.classList.add('sel');
      stSel.textContent = `"${file.name}" 선택됨`;
      detailPane.innerHTML = `<strong>${file.name}</strong><br><span style="color:#555;font-size:10px">${file.type.toUpperCase()} 파일</span>`;
      window.open(file.href, '_blank');
    });
    fileGrid.appendChild(el);
  });

  if (!win.classList.contains('open')) {
    win.style.transform = 'translate(-50%, -50%)';
    win.style.left = '50%';
    win.style.top = '50%';
  }
  win.classList.add('open');
}

/* ================================================
   DRAG
   ================================================ */
const titleBar = document.getElementById('titleBar');
let isDragging = false, dragInitX, dragInitY;

titleBar.addEventListener('mousedown', e => {
  if (e.target.classList.contains('wxbtn')) return;
  isDragging = true;
  const rect = win.getBoundingClientRect();
  win.style.transform = 'none';
  win.style.left = rect.left + 'px';
  win.style.top = rect.top + 'px';
  dragInitX = e.clientX - rect.left;
  dragInitY = e.clientY - rect.top;
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  e.preventDefault();
  win.style.left = (e.clientX - dragInitX) + 'px';
  win.style.top = (e.clientY - dragInitY) + 'px';
});
document.addEventListener('mouseup', () => { isDragging = false; });

/* ================================================
   CLOCK
   ================================================ */
function tick() {
  const d = new Date();
  let h = d.getHours(), m = d.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent = `${h}:${m.toString().padStart(2,'0')} ${ap}`;
}
setInterval(tick, 1000);
tick();
