body {
  overflow: hidden;
  font-family: Tahoma, "Trebuchet MS", sans-serif;
  width: 100vw; height: 100vh;
  background: #000;
}

/* ===== DESKTOP ===== */
#desktop {
  width: 100%; height: calc(100vh - 30px);
  background: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=2832&auto=format&fit=crop') center bottom / cover;
  padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
  align-items: flex-start;
  position: relative;
}

.desk-icon {
  width: 80px;
  display: flex; flex-direction: column; align-items: center;
  padding: 6px 4px 4px;
  cursor: pointer;
  border: 1px solid transparent; border-radius: 2px;
}
.desk-icon:hover { background: rgba(255,255,255,0.12); }
.desk-icon.sel { background: rgba(49,106,197,0.45); border-color: rgba(255,255,255,0.65); }
.desk-icon svg { width: 48px; height: 44px; display: block; margin-bottom: 5px; }
.desk-icon .dlbl {
  color: #fff; font-size: 11px; text-align: center; line-height: 1.3;
  text-shadow: 1px 1px 1px #000, -1px -1px 1px #000, 1px -1px 1px #000, -1px 1px 1px #000;
  padding: 1px 3px; max-width: 76px;
}
.desk-icon.sel .dlbl { background: #0258e8; text-shadow: none; }

/* ===== TASKBAR ===== */
#taskbar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 30px;
  background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #333 100%);
  display: flex; align-items: center; justify-content: space-between;
  z-index: 9999;
}
#start-btn {
  height: 100%; border: none;
  background: linear-gradient(to bottom, #5cb65c, #3c8d3c);
  border-radius: 0 14px 14px 0;
  padding: 0 14px 0 8px;
  display: flex; align-items: center; gap: 6px;
  cursor: pointer; color: #fff;
  font-weight: bold; font-style: italic; font-size: 14px;
  font-family: Tahoma, sans-serif;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  box-shadow: inset 1px 1px rgba(255,255,255,0.3), inset -1px 0 rgba(0,0,0,0.15);
}
#start-btn:active { filter: brightness(0.85); }
.winlogo {
  width: 16px; height: 16px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
  transform: skewY(-10deg);
}
.winlogo s { display: block; }
.winlogo s:nth-child(1) { background: #f04e23; }
.winlogo s:nth-child(2) { background: #79c539; }
.winlogo s:nth-child(3) { background: #00a4ef; }
.winlogo s:nth-child(4) { background: #fdbb00; }
#clock {
  height: 100%;
  background: linear-gradient(to bottom, #108ae5, #0e72bd);
  border-left: 1px solid rgba(255,255,255,0.15);
  padding: 0 14px;
  display: flex; align-items: center;
  color: #fff; font-size: 11px;
}

/* ===== EXPLORER WINDOW ===== */
.xpwin {
  position: fixed;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 900px; max-width: calc(100vw - 16px);
  height: 570px; max-height: calc(100vh - 60px);
  display: none; flex-direction: column;
  background: #ece9d8;
  border: 1px solid #00138c;
  border-radius: 8px 8px 0 0;
  box-shadow: 4px 4px 24px rgba(0,0,0,0.75), inset 0 0 0 1px #2050e0;
  z-index: 1000; overflow: hidden;
}
.xpwin.open { display: flex; }

/* Title bar */
.xptb {
  background: linear-gradient(to bottom, #0058e6 0%, #3a93ff 8%, #288eff 40%, #127dff 88%, #036bfe 100%);
  padding: 4px 6px 4px 8px;
  border-radius: 7px 7px 0 0;

}
.xptb-l {
  color: #fff; font-size: 12px; font-weight: bold;

.wxbtn {

  display: flex; align-items: center; justify-content: center;

.xpmb span { padding: 3px 8px; font-size: 11px; cursor: default; }

.xpsb-link {

.xpsb-link:hover { background: rgba(255,255,255,0.6); }
.xpsb-link svg { width: 16px; height: 14px; flex-shrink: 0; }
#detailPane {

/* File area */

.xpfc::-webkit-scrollbar-button { display: block; height: 16px; background: #e3e3e3; border: 1px outset #e8e8e8; }

.fgrid {

.fitem {

.xpst span:last-child { border-right: none; padding-right: 0; }

  document.querySelectorAll('.desk-icon').forEach(i => i.classList.remove('sel'));
});

// ======== WINDOW LOGIC ========
const win = document.getElementById('win');
const winTitle = document.getElementById('winTitle');
const addrBar = document.getElementById('addrBar');
const fileGrid = document.getElementById('fileGrid');
const stCount = document.getElementById('stCount');
const stSel = document.getElementById('stSel');
const detailPane = document.getElementById('detailPane');

document.getElementById('closeBtn').onclick = () => win.classList.remove('open');

function openFolder(id) {
  const f = FOLDERS[id];
  winTitle.textContent = `3wsj — ${f.label}`;
  addrBar.textContent = f.path;
  stCount.textContent = `${f.files.length}개 항목`;
  stSel.textContent = '';
  detailPane.innerHTML = `<strong>${f.label}</strong><br>${f.files.length}개 항목`;

  fileGrid.innerHTML = '';
  f.files.forEach(file => {
    const el = document.createElement('div');
    el.className = 'fitem';
    el.innerHTML = (ICON[file.type] || ICON.doc) + `<span class="fn">${file.name}</span>`;
    el.addEventListener('click', e => {
      e.stopPropagation();
      document.querySelectorAll('.fitem').forEach(i => i.classList.remove('sel'));
      el.classList.add('sel');
      stSel.textContent = `"${file.name}" 선택됨`;
      detailPane.innerHTML = `<strong>${file.name}</strong><br><span style="color:#555;font-size:10px">${file.type.toUpperCase()} 파일</span>`;
      window.open(file.href, '_blank');
    });
    fileGrid.appendChild(el);
  });

  if (!win.classList.contains('open')) {
    win.style.transform = 'translate(-50%, -50%)';
    win.style.left = '50%';
    win.style.top = '50%';
  }
  win.classList.add('open');
  win.style.zIndex = 1000;
}

// ======== DRAGGABLE ========
const titleBar = document.getElementById('titleBar');
let isDragging = false;
let dragInitX, dragInitY;

titleBar.addEventListener('mousedown', e => {
  if (e.target.classList.contains('wxbtn')) return;
  isDragging = true;
  const rect = win.getBoundingClientRect();
  win.style.transform = 'none';
  win.style.left = rect.left + 'px';
  win.style.top = rect.top + 'px';
  dragInitX = e.clientX - rect.left;
  dragInitY = e.clientY - rect.top;
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  e.preventDefault();
  win.style.left = (e.clientX - dragInitX) + 'px';
  win.style.top = (e.clientY - dragInitY) + 'px';
});

document.addEventListener('mouseup', () => { isDragging = false; });

// ======== CLOCK ========
function tick() {
  const d = new Date();
  let h = d.getHours(), m = d.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent = `${h}:${m.toString().padStart(2,'0')} ${ap}`;
}
setInterval(tick, 1000);
tick();
</script>
